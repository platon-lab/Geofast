<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва Улюбленців - Нова Ера</title>
    <style>
        :root {
            --bg-color: #050410;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-glow: 0 0 15px rgba(120, 0, 255, 0.6);
            --text-color: #f0f0f0;
            --accent: #b026ff;
            --bot-color: #ff3366;
            --human-color: #00ffcc;
            --alliance-color: #ff33a1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050410 100%);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bgPulse 10s infinite alternate;
        }

        @keyframes bgPulse {
            0% { background-image: radial-gradient(circle at center, #1a1a2e 0%, #050410 100%); }
            100% { background-image: radial-gradient(circle at center, #231a3e 0%, #02010a 100%); }
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            z-index: 10;
            padding: 10px;
        }

        .screen.active { opacity: 1; transform: scale(1); pointer-events: auto; }

        h1 { font-size: 2rem; text-shadow: var(--neon-glow); margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        h2 { font-size: 1.4rem; margin-bottom: 15px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.0));
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            margin: 8px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover { background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 15px var(--accent); }
        .btn:active { transform: scale(0.92); background: var(--accent); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        .char-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-bottom: 20px; 
            max-height: 55vh; 
            overflow-y: auto; 
            padding: 10px;
            padding-right: 15px;
        }
        
        .char-grid::-webkit-scrollbar { width: 6px; }
        .char-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .char-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .char-card {
            position: relative;
            padding: 12px;
            text-align: center;
            border: 2px solid transparent;
            font-size: 0.85rem;
            border-radius: 15px;
            transition: 0.3s;
        }

        .ban-btn {
            position: absolute;
            top: -5px; right: -5px;
            background: rgba(255, 0, 0, 0.8);
            border: 2px solid white;
            border-radius: 50%;
            width: 28px; height: 28px;
            color: white; font-size: 12px; font-weight: bold;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        
        .ban-btn:hover { transform: scale(1.1); }

        .char-card.banned { opacity: 0.4; filter: grayscale(1); border-color: red !important; box-shadow: none !important; }
        .char-card.banned img { opacity: 0.5; }

        .char-card img {
            width: 55px; height: 55px;
            border-radius: 50%;
            margin-bottom: 8px;
            background: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .char-card.selected { border-color: var(--human-color); box-shadow: 0 0 15px var(--human-color); transform: translateY(-5px); }

        /* Arena */
        #arena { position: relative; width: 100%; height: 100%; }

        .center-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            width: 220px;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(176, 38, 255, 0.2);
        }

        .player-node {
            position: absolute;
            width: 90px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translate(-50%, -50%);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .player-node img {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 3px solid #333;
            transition: 0.3s;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        .player-node .name { font-size: 0.75rem; font-weight: 800; margin-top: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .player-node .hp { font-size: 0.65rem; color: #ff4d4d; text-align: center; margin-top: 2px; font-weight: bold; }
        .player-node .status { font-size: 0.75rem; margin-top: 2px; }

        .player-node.active img { border-color: var(--accent); box-shadow: 0 0 25px var(--accent); transform: scale(1.15); }
        .player-node.dead img { filter: grayscale(1) brightness(0.4); border-color: #222; box-shadow: none; }
        
        .player-node.targetable img {
            border-color: #ffeb3b;
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.6);
            animation: pulse 1s infinite alternate;
            cursor: crosshair;
        }

        .player-node.ally img { border-color: var(--alliance-color); box-shadow: 0 0 20px var(--alliance-color); }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        .action-bar {
            position: absolute;
            bottom: 15px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            display: flex;
            gap: 5px;
            padding: 8px;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            width: 98%;
            max-width: 600px;
            justify-content: flex-start;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
            transition: all 0.4s ease;
        }
        
        .action-bar::-webkit-scrollbar { height: 6px; }
        .action-bar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .action-bar.visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }

        .action-btn {
            min-width: 55px; 
            flex: 0 0 auto; 
            padding: 5px 8px; 
            text-align: center;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover:not(.disabled) { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .action-btn:active:not(.disabled) { transform: scale(0.9); }
        .action-btn.disabled { opacity: 0.25; pointer-events: none; filter: grayscale(1); }
        
        .action-btn .emoji { font-size: 1.5rem; margin-bottom: 3px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .action-btn .desc { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; white-space: nowrap; }

        .projectile {
            position: absolute;
            font-size: 2rem;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, -2px, 0); }
            20%, 80% { transform: translate3d(3px, 3px, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, -5px, 0); }
            40%, 60% { transform: translate3d(5px, 5px, 0); }
        }

        .flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: white; opacity: 0; pointer-events: none; z-index: 1000;
            transition: opacity 0.2s;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transition: all 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        
        #sandbox-config-container {
            width: 100%; 
            max-width: 500px;
            max-height: 55vh; 
            overflow-y: auto; 
            padding-right: 10px;
        }
        #sandbox-config-container::-webkit-scrollbar { width: 6px; }
        #sandbox-config-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* LEGENDARY MAYO BUTTON */
        .action-btn.legendary {
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700) !important;
            background-size: 200% 200% !important;
            animation: legendaryShimmer 1.5s infinite, legendaryPulse 0.8s infinite alternate !important;
            border: 2px solid gold !important;
            box-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00 !important;
        }
        @keyframes legendaryShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes legendaryPulse {
            0% { box-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00; transform: scale(1); }
            100% { box-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00, 0 0 80px gold; transform: scale(1.05); }
        }

        /* MAYO EXPLOSION OVERLAY */
        #mayo-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index: 9999;
            display: none;
            overflow: hidden;
        }
        #mayo-canvas {
            position: absolute; top:0; left:0;
            width:100%; height:100%;
        }
        #mayo-winner-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            color: gold;
            text-shadow: 0 0 30px gold, 0 0 60px orange;
            text-align: center;
            z-index: 10001;
            display: none;
            animation: winnerPulse 0.5s infinite alternate;
        }
        @keyframes winnerPulse {
            0% { transform: translate(-50%,-50%) scale(1); }
            100% { transform: translate(-50%,-50%) scale(1.1); }
        }

        /* Зоряний фон гри */
        #star-bg {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .star-particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Красивий ефект на активного гравця */
        .player-node.active::before {
            content: '';
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(176,38,255,0.4) 0%, transparent 70%);
            animation: activePulseRing 1s infinite;
            top: 15px; left: 5px;
            pointer-events: none;
        }
        @keyframes activePulseRing {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Ефект ореолу на іконці під час ходу */
        .player-node.active img {
            animation: activeGlow 1s infinite alternate !important;
        }
        @keyframes activeGlow {
            0% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
            100% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #b026ff; }
        }

        /* Красивий трейл для снаряда */
        .projectile { filter: drop-shadow(0 0 8px currentColor) !important; }
        
    </style>
</head>
<body>

    <div id="star-bg"></div>
    <div id="flash-overlay" class="flash"></div>
    <div id="mayo-overlay">
        <canvas id="mayo-canvas"></canvas>
        <div id="mayo-winner-text"></div>
    </div>

    <div id="main-menu" class="screen active">
        <h1>PLATON GAMES</h1>
        <button class="btn" onclick="goToModeSelect(1)">1 Гравець</button>
        <button class="btn" onclick="goToModeSelect('multi')">Мультиплеєр</button>
        <button class="btn" onclick="goToSandbox()">Пісочниця</button>
    </div>

    <div id="char-select-screen" class="screen glass">
        <h2 id="char-select-title">Обери Героя</h2>
        <div class="char-grid" id="char-grid"></div>
        <button class="btn" id="start-game-btn" onclick="startGame()" disabled>🚀 ПОГНАЛИ!</button>
    </div>

    <div id="sandbox-screen" class="screen glass">
        <h2>Налаштування Пісочниці</h2>
        <div id="sandbox-config-container">
            <div id="sandbox-config" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
        <button class="btn" onclick="startSandboxGame()" style="margin-top:15px;">ПУСК 🎮</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="arena">
            <div class="center-indicator glass" id="center-info">Готуємо арену...</div>
            <div id="players-container"></div>
            <div class="action-bar glass" id="action-bar"></div>
        </div>
    </div>

    <script>
        const CHARACTERS = [
            { id: 'tito', name: 'Тіто', img: 'Tito.png' },
            { id: 'smartik', name: 'Смартік', img: 'Smartik.png' },
            { id: 'junior', name: 'Джуніор', img: 'Junior.png' },
            { id: 'fil', name: 'Філ', img: 'Fil.png' },
            { id: 'milka', name: 'Мілка', img: 'Milka.png' },
            { id: 'bark', name: 'Барк', img: 'Bark.png' },
            { id: 'persik', name: 'Персік', img: 'Persik.png' },
            { id: 'spike', name: 'Спайк', img: 'Spike.png' },
            { id: 'alyonka', name: 'Альонка', img: 'Alyonka.png' },
            { id: 'lilu', name: 'Лілу', img: 'Lilu.png' },
            { id: 'manya', name: 'Маня', img: 'Manya.png' },
            { id: 'liza', name: 'Ліза', img: 'Liza.png' },
            { id: 'grivna', name: 'Гривна', img: 'Grivna.png' },
            { id: 'ben', name: 'Бен', img: 'Ben.png' },
            { id: 'goldi', name: 'Голді', img: 'Goldi.png' },
            { id: 'raf', name: 'Раф', img: 'Raf.png' },
            { id: 'veles', name: 'Велес', img: 'Велес.png' }, /* Or Veles.png */
            { id: 'masha', name: 'Маша', img: 'Masha.png' },
            { id: 'brilliantik', name: 'Брілліантік', img: 'Brilliantik.png' },
            { id: 'richik', name: 'Річік', img: 'Richik.png' }
        ];

        const ACTIONS = [
            { id: 'dot', emoji: '🎯', name: 'Пуля', desc: '-1 HP', chance: 0.9, type: 'attack' },
            { id: 'grenade', emoji: '💣', name: 'Граната', desc: '-2 HP', chance: 0.6, type: 'attack' },
            { id: 'sniper', emoji: '🔭', name: 'Снайперка', desc: '-3 HP', chance: 0.4, type: 'attack' },
            { id: 'laser', emoji: '🔫', name: 'Лазер', desc: '-5 HP', chance: 0.25, type: 'attack' },
            { id: 'nuke', emoji: '☢️', name: 'Ядерка', desc: '-6 HP', chance: 0.2, type: 'attack', cost: 'nukes' },
            { id: 'poison', emoji: '☠️', name: 'Отрута', desc: 'Хід -1', chance: 0.4, type: 'attack' },
            { id: 'freeze', emoji: '❄️', name: 'Заморозка', desc: 'Пропуск', chance: 0.3, type: 'attack' },

            { id: 'medkit', emoji: '🩹', name: 'Аптечка', desc: '+3 HP', chance: 0.35, type: 'support', self: true },
            { id: 'heal', emoji: '❤️', name: 'Альянс', desc: '+1 HP & Дружба', chance: 0.5, type: 'support' },
            { id: 'revive', emoji: '🔮', name: 'Респавн', desc: 'HP 2', chance: 0.2, type: 'support' },
            // 20 нових предметів
            { id: 'sword', emoji: '⚔️', name: 'Меч', desc: '-4 HP', chance: 0.35, type: 'attack' },
            { id: 'bomb', emoji: '💥', name: 'Бомба', desc: '-3 HP Вибух', chance: 0.45, type: 'attack' },
            { id: 'thunderbolt', emoji: '⚡', name: 'Блискавка', desc: '-4 HP', chance: 0.3, type: 'attack' },
            { id: 'fire', emoji: '🔥', name: 'Вогонь', desc: '-2 HP Опік', chance: 0.5, type: 'attack' },
            { id: 'arrow', emoji: '🏹', name: 'Стріла', desc: '-2 HP', chance: 0.65, type: 'attack' },
            { id: 'tornado', emoji: '🌪️', name: 'Торнадо', desc: '-3 HP', chance: 0.35, type: 'attack' },
            { id: 'axe', emoji: '🪓', name: 'Сокира', desc: '-3 HP', chance: 0.4, type: 'attack' },
            { id: 'skull', emoji: '💀', name: 'Прокляття', desc: '-5 HP Темрява', chance: 0.2, type: 'attack' },
            { id: 'explosion', emoji: '🧨', name: 'Петарда', desc: '-2 HP Оглушення', chance: 0.5, type: 'attack' },
            { id: 'comet', emoji: '☄️', name: 'Комета', desc: '-7 HP Рідко', chance: 0.15, type: 'attack' },
            { id: 'magic', emoji: '🪄', name: 'Магія', desc: '+5 HP Собі', chance: 0.3, type: 'support', self: true },
            { id: 'potion', emoji: '🧪', name: 'Зілля', desc: '+4 HP', chance: 0.35, type: 'support' },
            { id: 'star', emoji: '⭐', name: 'Зірка', desc: '+2 HP & Щит', chance: 0.3, type: 'support', self: true },
            { id: 'cookie', emoji: '🍪', name: 'Печиво', desc: '+2 HP Смачно', chance: 0.5, type: 'support', self: true },
            { id: 'diamond', emoji: '💎', name: 'Діамант', desc: 'Двощит', chance: 0.2, type: 'support', self: true },
            { id: 'bubble', emoji: '🫧', name: 'Бульбашка', desc: 'Заморозка собі', chance: 0.4, type: 'support', self: true },
            { id: 'mushroom', emoji: '🍄', name: 'Гриб', desc: 'Рандом ефект', chance: 0.45, type: 'attack' },
            { id: 'robot', emoji: '🤖', name: 'Робот', desc: '-2 HP x2 цілі', chance: 0.3, type: 'attack' },
            { id: 'eye', emoji: '👁️', name: 'Всевидяче Oko', desc: '-3 HP Не промах', chance: 0.35, type: 'attack' },
            { id: 'dragon', emoji: '🐉', name: 'Дракон', desc: '-6 HP Вогонь', chance: 0.18, type: 'attack' },
            // РІДКІСНИЙ ПРЕДМЕТ - МАЙОНЕЗ (1%)
            { id: 'mayo', emoji: '🥫', name: '✨МАЙОНЕЗ✨', desc: '1% ЛЕГЕНДА', chance: 0.01, type: 'special', special: true, rarity: 'legendary' },
        ];

        let mode = 1, selectedChars = [], bannedChars = [], players = [], currentPlayerIndex = -1, selectedAction = null, gameActive = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if(type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(); osc.stop(now + 0.15);
            } else if(type === 'boom') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if(type === 'heal') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            } else if(type === 'break') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.2);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if(type === 'freeze') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.3);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<12; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                p.style.width = (Math.random() * 8 + 4) + 'px';
                p.style.height = p.style.width;
                p.style.background = color;
                p.style.boxShadow = `0 0 10px ${color}`;
                document.body.appendChild(p);
                
                setTimeout(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 80 + 30;
                    p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`;
                    p.style.opacity = '0';
                }, 10);
                setTimeout(() => p.remove(), 600);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleBan(id, e, btn) {
            e.stopPropagation();
            const card = btn.parentElement;
            if(bannedChars.includes(id)) {
                bannedChars = bannedChars.filter(x => x !== id);
                card.classList.remove('banned');
                btn.innerText = '❌';
                btn.style.background = 'rgba(255, 0, 0, 0.8)';
            } else {
                bannedChars.push(id);
                card.classList.add('banned');
                btn.innerText = '✅';
                btn.style.background = 'rgba(100, 100, 100, 0.8)';
                
                if(selectedChars.includes(id)) {
                    selectedChars = selectedChars.filter(x => x !== id);
                    card.classList.remove('selected');
                }
            }
            document.getElementById('start-game-btn').disabled = mode === 1 ? selectedChars.length !== 1 : selectedChars.length < 2;
        }

        function goToModeSelect(m) {
            mode = m; selectedChars = []; bannedChars = [];
            const grid = document.getElementById('char-grid'); grid.innerHTML = '';
            
            CHARACTERS.forEach(char => {
                const card = document.createElement('div');
                card.className = 'char-card glass';
                card.innerHTML = `
                    <button class="ban-btn" title="Видалити/Повернути героя" onclick="toggleBan('${char.id}', event, this)">❌</button>
                    <img src="${char.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\' width=\\'50\\' height=\\'50\\'><rect width=\\'50\\' height=\\'50\\' fill=\\'%23444\\'/></svg>'">
                    <div style="font-weight:bold;">${char.name}</div>
                `;
                card.onclick = () => {
                    if (bannedChars.includes(char.id)) return; 
                    
                    if (mode === 1) { 
                        selectedChars = [char.id]; 
                        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected')); 
                        card.classList.add('selected'); 
                    } else { 
                        card.classList.toggle('selected'); 
                        if(selectedChars.includes(char.id)) selectedChars = selectedChars.filter(x => x!==char.id); 
                        else selectedChars.push(char.id); 
                    }
                    document.getElementById('start-game-btn').disabled = mode === 1 ? selectedChars.length !== 1 : selectedChars.length < 2;
                };
                grid.appendChild(card);
            });
            showScreen('char-select-screen');
        }

        function goToSandbox() {
            mode = 'sandbox'; const config = document.getElementById('sandbox-config'); config.innerHTML = '';
            players = CHARACTERS.map(c => ({ ...c, hp: 10, nukes: 1, isBot: true, included: true }));
            players.forEach((p, i) => {
                const div = document.createElement('div'); 
                div.className = 'glass'; 
                div.style.padding='8px'; 
                div.style.display='flex'; 
                div.style.alignItems='center'; 
                div.style.gap='8px';
                div.style.flexWrap='wrap';
                
                div.innerHTML = `
                    <input type="checkbox" checked onchange="players[${i}].included=this.checked" style="width:20px;height:20px;cursor:pointer;"> 
                    <img src="${p.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\' width=\\'50\\' height=\\'50\\'><rect width=\\'50\\' height=\\'50\\' fill=\\'%23444\\'/></svg>'" style="width:30px;height:30px;border-radius:50%;">
                    <strong style="flex:1;min-width:70px;">${p.name}</strong> 
                    <select onchange="players[${i}].isBot=(this.value==='bot')" style="background:var(--bg-color);color:white;border:1px solid var(--glass-border);border-radius:5px;padding:4px;">
                        <option value="bot">🤖 Бот</option>
                        <option value="human">👤 Грав.</option>
                    </select>
                    <span style="white-space:nowrap;">❤️ <input type="number" value="10" min="1" max="99" style="width:45px; border-radius:5px; border:none; padding:4px; text-align:center; background:#eee; color:#000;" onchange="players[${i}].hp=parseInt(this.value)"></span>
                    <span style="white-space:nowrap;">☢️ <input type="number" value="1" min="0" max="4" style="width:35px; border-radius:5px; border:none; padding:4px; text-align:center; background:#eee; color:#000;" onchange="players[${i}].nukes=parseInt(this.value)"></span>
                `;
                config.appendChild(div);
            });
            showScreen('sandbox-screen');
        }

        function startGame() {
            const activeChars = CHARACTERS.filter(c => !bannedChars.includes(c.id));
            players = activeChars.map(c => ({ 
                ...c, 
                hp: Math.floor(Math.random()*15)+5, 
                nukes: Math.floor(Math.random()*4)+1, // 1 to 4 nukes
                isBot: !selectedChars.includes(c.id), 
                poison: 0, 
                frozen: 0,
                shield: false,
                alive: true, 
                ally: null 
            }));
            initArena();
        }

        function startSandboxGame() {
            players = players.filter(p => p.included).map(p => ({ 
                ...p, 
                alive: true, 
                poison: 0, 
                frozen: 0,
                shield: false,
                ally: null 
            }));
            initArena();
        }

        function initArena() {
            showScreen('game-screen'); renderActionBar(); gameActive = true;
            renderPlayers(); chooseFirstPlayer();
        }

        function chooseFirstPlayer() {
            let idx = Math.floor(Math.random() * players.length);
            currentPlayerIndex = idx;
            beginTurn();
        }

        function renderPlayers() {
            const container = document.getElementById('players-container'); container.innerHTML = '';
            const W = window.innerWidth, H = window.innerHeight;
            const cx = W / 2, cy = H / 2;
            const alive_count = players.length;
            
            players.forEach((p, i) => {
                let px, py;
                
                if (alive_count >= 11) {
                    // Квадратна сітка по всьому екрану
                    const cols = Math.ceil(Math.sqrt(alive_count * W / H));
                    const rows = Math.ceil(alive_count / cols);
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const padX = W * 0.08, padY = H * 0.1;
                    px = padX + col * (W - padX*2) / Math.max(cols-1, 1);
                    py = padY + row * (H - padY*2) / Math.max(rows-1, 1);
                } else {
                    // Звичайне коло
                    const radius = Math.min(W, H) * 0.35;
                    const angle = (i / alive_count) * 2 * Math.PI - Math.PI/2;
                    px = cx + radius * Math.cos(angle);
                    py = cy + radius * Math.sin(angle);
                }

                const node = document.createElement('div');
                node.className = `player-node ${p.alive ? '' : 'dead'}`;
                if (p.ally !== null) node.classList.add('ally');
                node.id = `node-${i}`;
                node.style.left = `${px}px`;
                node.style.top = `${py}px`;
                node.onclick = () => handleTarget(i);
                
                let statusHtml = '';
                if(p.poison > 0) statusHtml += '🤢 ';
                if(p.frozen > 0) statusHtml += '❄️ ';
                if(p.shield) statusHtml += '💠 ';
                if(p.nukes > 0) statusHtml += `☢️${p.nukes} `;
                if(p.ally !== null) statusHtml += '🤝';

                node.innerHTML = `
                    <div class="name" style="color:${p.isBot?'var(--bot-color)':'var(--human-color)'}">${p.name}</div>
                    <img src="${p.img}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\' width=\\'50\\' height=\\'50\\'><rect width=\\'50\\' height=\\'50\\' fill=\\'%23444\\'/></svg>'">
                    <div class="hp">${p.alive ? '❤️'.repeat(Math.min(p.hp, 5))+(p.hp>5?'+'+(p.hp-5):'') : '💀'}</div>
                    <div class="status">${statusHtml}</div>`;
                container.appendChild(node);
            });
        }

        function renderActionBar() {
            const bar = document.getElementById('action-bar'); bar.innerHTML = '';
            ACTIONS.forEach((a, i) => {
                const b = document.createElement('div'); 
                b.className = 'action-btn glass'; 
                if(a.rarity === 'legendary') b.classList.add('legendary');
                b.id = `act-${i}`;
                b.innerHTML = `<div class="emoji">${a.emoji}</div><div class="desc">${a.name}</div>`;
                b.onclick = () => { 
                    selectedAction = a; 
                    document.querySelectorAll('.player-node').forEach((n, idx) => { 
                        let isEnemyAlly = (players[currentPlayerIndex].ally === idx && a.type === 'attack');
                        let isCorrectLifeState = (a.id === 'revive' ? !players[idx].alive : players[idx].alive);
                        
                        if(a.special) {
                            // Mayo - тільки центр, не на гравців
                            n.classList.remove('targetable');
                        } else if(a.self) {
                            if(idx === currentPlayerIndex) n.classList.add('targetable');
                            else n.classList.remove('targetable');
                        } else {
                            if(idx !== currentPlayerIndex && isCorrectLifeState && !isEnemyAlly) {
                                n.classList.add('targetable'); 
                            } else {
                                n.classList.remove('targetable');
                            }
                        }
                    });
                    // Mayo - одразу виконуємо без цілі
                    if(a.special) {
                        executeAction(-1, a);
                    }
                };
                bar.appendChild(b);
            });
        }

        async function beginTurn() {
            const p = players[currentPlayerIndex];
            if(!p.alive || !gameActive) { passTurn( (currentPlayerIndex+1)%players.length ); return; }

            players.forEach((target, idx) => {
                if(target.alive && target.poison > 0) {
                    target.hp -= 1; target.poison -= 1;
                    animateText(idx, "-1 🤢", "#00ffcc");
                    if(target.hp <= 0) { target.alive = false; playSound('boom'); }
                }
            });
            renderPlayers();
            if(!p.alive) { passTurn((currentPlayerIndex+1)%players.length); return; }

            if(p.frozen > 0) {
                p.frozen -= 1;
                document.getElementById(`node-${currentPlayerIndex}`).classList.add('active');
                setCenterText(`❄️ ${p.name} ПРОПУСКАЄ ❄️`, "cyan");
                renderPlayers();
                setTimeout(() => passTurn((currentPlayerIndex+1)%players.length), 1500);
                return;
            }

            document.querySelectorAll('.player-node').forEach(n => n.classList.remove('active', 'targetable'));
            document.getElementById(`node-${currentPlayerIndex}`).classList.add('active');
            setCenterText(`Хід: ${p.name}`, "white");

            if(p.isBot) { 
                await new Promise(r => setTimeout(r, 1200)); 
                botLogic(); 
            } else { 
                document.getElementById('action-bar').classList.add('visible');
                
                let availableCount = 0;
                ACTIONS.forEach((a, i) => {
                    const btn = document.getElementById(`act-${i}`);
                    let available = Math.random() < a.chance && (a.cost==='nukes'?p.nukes>0:true);
                    if (available) availableCount++;
                    btn.classList.toggle('disabled', !available);
                    // Mayo завжди виглядає особливо навіть коли disabled
                    if(a.rarity === 'legendary' && available) {
                        btn.classList.remove('disabled');
                        // Показати спалах коли майонез доступний
                        showMayoAppear();
                    }
                });

                if(availableCount === 0) document.getElementById('act-0').classList.remove('disabled');
            }
        }

        function botLogic() {
            const acts = ACTIONS.filter(a => Math.random() < a.chance && (a.cost==='nukes'?players[currentPlayerIndex].nukes>0:true));
            const a = acts.length ? acts[Math.floor(Math.random()*acts.length)] : ACTIONS[0];
            
            if(a.self) {
                executeAction(currentPlayerIndex, a);
                return;
            }

            const targets = players.map((p,i)=>i).filter(i => {
                let isEnemyAlly = (players[currentPlayerIndex].ally === i && a.type === 'attack');
                return i !== currentPlayerIndex && (a.id === 'revive' ? !players[i].alive : players[i].alive) && !isEnemyAlly;
            });

            if(targets.length) executeAction(targets[Math.floor(Math.random()*targets.length)], a);
            else passTurn((currentPlayerIndex+1)%players.length);
        }

        function handleTarget(i) {
            if(!selectedAction) return;
            if(selectedAction.self && i !== currentPlayerIndex) return;
            if(!selectedAction.self && i === currentPlayerIndex) return;
            if(selectedAction.id === 'revive' && players[i].alive) return;
            if(selectedAction.id !== 'revive' && !players[i].alive) return;
            if(players[currentPlayerIndex].ally === i && selectedAction.type === 'attack') return;

            executeAction(i, selectedAction);
        }

        async function executeAction(tIdx, a) {
            selectedAction = null;
            document.getElementById('action-bar').classList.remove('visible');
            document.querySelectorAll('.player-node').forEach(n => n.classList.remove('targetable'));
            
            const attacker = players[currentPlayerIndex];
            if(a.cost === 'nukes') attacker.nukes--;

            // МАЙОНЕЗ - особлива анімація!
            if(a.id === 'mayo') {
                await triggerMayoEvent(currentPlayerIndex);
                return;
            }

            if(!a.self && tIdx >= 0) {
                playSound(a.id === 'hammer' ? 'shoot' : (a.id === 'laser' ? 'shoot' : 'shoot'));
                await animateProjectile(currentPlayerIndex, tIdx, a.emoji);
            }

            if(tIdx < 0) { passTurn((currentPlayerIndex+1)%players.length); return; }

            const target = players[tIdx];
            const tNode = document.getElementById(`node-${tIdx}`);
            const rect = tNode.getBoundingClientRect();
            const px = rect.left + rect.width/2;
            const py = rect.top + rect.height/2;

            let dmg = 0;
            if(a.id === 'dot') dmg = 1;
            else if(a.id === 'grenade') dmg = 2;
            else if(a.id === 'nuke') dmg = 6;
            else if(a.id === 'sniper') dmg = 3;
            else if(a.id === 'laser') dmg = 5;
            else if(a.id === 'vampire') dmg = 2;
            else if(a.id === 'hammer') dmg = 1;
            // Нові предмети
            else if(a.id === 'sword') dmg = 4;
            else if(a.id === 'bomb') dmg = 3;
            else if(a.id === 'thunderbolt') dmg = 4;
            else if(a.id === 'fire') dmg = 2;
            else if(a.id === 'arrow') dmg = 2;
            else if(a.id === 'tornado') dmg = 3;
            else if(a.id === 'axe') dmg = 3;
            else if(a.id === 'skull') dmg = 5;
            else if(a.id === 'explosion') dmg = 2;
            else if(a.id === 'comet') dmg = 7;
            else if(a.id === 'eye') dmg = 3;
            else if(a.id === 'dragon') dmg = 6;
            else if(a.id === 'robot') dmg = 2;
            else if(a.id === 'mushroom') dmg = Math.floor(Math.random()*6)+1;

            if (dmg > 0) {
                if (target.shield) {
                    target.shield = false;
                    playSound('break');
                    animateText(tIdx, "💠 БЛОК!", "#00ffff");
                    createParticles(px, py, '#00ffff');
                } else {
                    target.hp -= dmg;
                    if(a.id === 'grenade' || a.id === 'nuke' || a.id === 'bomb' || a.id === 'comet' || a.id === 'dragon') { playSound('boom'); screenShake(); }
                    if(a.id === 'nuke' || a.id === 'comet') flash();
                    
                    let pColor = a.id==='laser'||a.id==='dragon'?'#ff00ff':(a.id==='sniper'||a.id==='eye'?'#ffffff':(a.id==='thunderbolt'?'#ffff00':(a.id==='fire'?'#ff6600':'#ff0000')));
                    createParticles(px, py, pColor);

                    if(a.id === 'vampire') { 
                        attacker.hp += 2; 
                        animateText(currentPlayerIndex, "+2 🩸", "#ff3333"); 
                        createParticles(px, py, '#8a0303');
                    }
                    if(a.id === 'hammer') {
                        if (target.ally !== null) {
                            let partnerIdx = target.ally;
                            playSound('break');
                            players[partnerIdx].ally = null;
                            target.ally = null;
                            animateText(tIdx, "💔 Альянс розбито!", "#ff3366");
                            animateText(partnerIdx, "💔", "#ff3366");
                        } else {
                            animateText(tIdx, "🔨 Ауч!", "gray");
                        }
                    }
                    if(a.id === 'fire') { target.poison = Math.max(target.poison, 2); animateText(tIdx, "🔥 Опік!", "#ff6600"); }
                    if(a.id === 'explosion') { target.frozen = Math.max(target.frozen, 1); animateText(tIdx, "😵 Оглушено", "#ffff00"); }
                    if(a.id === 'skull') { target.poison = Math.max(target.poison, 3); animateText(tIdx, "💀 Прокляття!", "#aa00ff"); createParticles(px,py,'#aa00ff'); }
                    if(a.id === 'mushroom') { animateText(tIdx, `🍄 -${dmg} HP`, "#ff00cc"); }
                    if(a.id === 'robot') {
                        // Бє двох цілей
                        const secondTargets = players.map((_,ii)=>ii).filter(ii=>ii!==currentPlayerIndex&&ii!==tIdx&&players[ii].alive);
                        if(secondTargets.length) {
                            const sec = secondTargets[Math.floor(Math.random()*secondTargets.length)];
                            players[sec].hp -= 2;
                            animateText(sec, "🤖 -2 HP", "#888888");
                            createParticles(px,py,'#888888');
                            if(players[sec].hp<=0){players[sec].hp=0;players[sec].alive=false;}
                        }
                    }
                }
            } 
            else if(a.id === 'poison') { 
                if(target.shield) { target.shield = false; animateText(tIdx, "💠 БЛОК!", "#00ffff"); }
                else { target.poison = 3; createParticles(px, py, '#00ff44'); animateText(tIdx, "☠️ Отруєно", "#00ff44"); }
            }
            else if(a.id === 'freeze') {
                if(target.shield) { target.shield = false; animateText(tIdx, "💠 БЛОК!", "#00ffff"); }
                else { target.frozen = 1; playSound('freeze'); createParticles(px, py, '#00ffff'); animateText(tIdx, "❄️ Заморожено", "cyan"); }
            }
            else if(a.id === 'shield') {
                target.shield = true; playSound('heal'); createParticles(px, py, '#00ffff'); animateText(tIdx, "💠 Щит", "cyan");
            }
            else if(a.id === 'medkit') {
                target.hp += 3; playSound('heal'); createParticles(px, py, '#00ff00'); animateText(tIdx, "+3 🩹", "#00ff00");
            }
            else if(a.id === 'heal') { 
                target.hp += 1; playSound('heal'); 
                createParticles(px, py, '#ff33a1');
                
                let A = currentPlayerIndex;
                let B = tIdx;

                if (players[A].ally !== null && players[A].ally !== B) players[players[A].ally].ally = null;
                if (players[B].ally !== null && players[B].ally !== A) players[players[B].ally].ally = null;

                players[A].ally = B;
                players[B].ally = A;

                animateText(A, "🤝 Альянс", "var(--alliance-color)");
                animateText(B, "🤝 Альянс", "var(--alliance-color)");
            }
            else if(a.id === 'revive') { 
                target.alive = true; target.hp = 2; target.poison = 0; target.frozen = 0; playSound('heal'); 
                createParticles(px, py, '#00ccff'); 
            }
            // Нові support предмети
            else if(a.id === 'magic') {
                attacker.hp += 5; playSound('heal'); createParticles(px, py, '#ff00ff'); animateText(currentPlayerIndex, "🪄 +5 HP", "#ff00ff");
            }
            else if(a.id === 'potion') {
                target.hp += 4; playSound('heal'); createParticles(px, py, '#00ff99'); animateText(tIdx, "🧪 +4 HP", "#00ff99");
            }
            else if(a.id === 'star') {
                attacker.hp += 2; attacker.shield = true; playSound('heal'); createParticles(px, py, '#ffff00'); animateText(currentPlayerIndex, "⭐ +2HP+Щит", "#ffff00");
            }
            else if(a.id === 'cookie') {
                attacker.hp += 2; playSound('heal'); createParticles(px, py, '#ff9900'); animateText(currentPlayerIndex, "🍪 +2 HP Смачно!", "#ff9900");
            }
            else if(a.id === 'diamond') {
                attacker.shield = true; playSound('heal'); createParticles(px, py, '#00ffff'); animateText(currentPlayerIndex, "💎 ДВА ЩИТИ!", "cyan");
            }
            else if(a.id === 'bubble') {
                attacker.frozen = 1; playSound('freeze'); createParticles(px, py, '#aaffff'); animateText(currentPlayerIndex, "🫧 Пауза", "#aaffff");
            }

            if(target && target.hp <= 0) { target.hp = 0; target.alive = false; target.ally = null; target.shield = false; }
            
            renderPlayers();
            if(checkWin()) return;

            setTimeout(() => passTurn(tIdx >= 0 ? tIdx : (currentPlayerIndex+1)%players.length), 1000);
        }

        function passTurn(nextIdx) {
            if(!gameActive) return;
            currentPlayerIndex = nextIdx;
            if(!players[currentPlayerIndex].alive) {
                let found = players.findIndex(p => p.alive);
                if(found !== -1) currentPlayerIndex = found;
            }
            beginTurn();
        }

        function checkWin() {
            const alive = players.filter(p => p.alive);
            
            if(alive.length === 1) {
                gameActive = false;
                setCenterText(`🏆 ${alive[0].name} ПЕРЕМОЖЕЦЬ! 🏆`, "gold");
                setTimeout(()=>location.reload(), 4000);
                return true;
            } 
            else if (alive.length === 2 && alive[0].ally === players.indexOf(alive[1])) {
                gameActive = false;
                setCenterText(`🏆 ПЕРЕМОГА АЛЬЯНСУ 🏆\n${alive[0].name} 🤝 ${alive[1].name}`, "gold");
                createParticles(window.innerWidth/2, window.innerHeight/2, 'gold');
                setTimeout(()=>location.reload(), 4000);
                return true;
            }
            return false;
        }

        function setCenterText(t, c="white") { 
            const el = document.getElementById('center-info'); 
            el.innerText = t; 
            el.style.color = c; 
            el.style.transform = "translate(-50%, -50%) scale(1.1)";
            setTimeout(() => el.style.transform = "translate(-50%, -50%) scale(1)", 200);
        }
        
        function animateProjectile(f, t, e) {
            return new Promise(res => {
                const p = document.createElement('div'); p.className = 'projectile'; p.innerText = e;
                const fNode = document.getElementById(`node-${f}`), tNode = document.getElementById(`node-${t}`);
                p.style.left = fNode.style.left; p.style.top = fNode.style.top;
                document.body.appendChild(p);
                setTimeout(() => { p.style.left = tNode.style.left; p.style.top = tNode.style.top; }, 50);
                setTimeout(() => { p.remove(); res(); }, 550);
            });
        }

        function animateText(i, t, c) {
            const n = document.getElementById(`node-${i}`);
            const d = document.createElement('div'); d.innerText = t;
            d.style.cssText = `position:absolute; left:${n.style.left}; top:${n.style.top}; color:${c}; font-weight:900; font-size: 1.2rem; text-shadow: 0 2px 5px rgba(0,0,0,0.8); pointer-events:none; z-index:200; transition: all 1s ease-out; transform:translate(-50%,-50%);`;
            document.body.appendChild(d);
            setTimeout(()=> { d.style.top = (parseFloat(n.style.top)-60)+'px'; d.style.opacity = 0; d.style.transform = "translate(-50%,-50%) scale(1.5)"; }, 50);
            setTimeout(()=> d.remove(), 1000);
        }

        function screenShake() { document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 400); }
        function flash() { const f = document.getElementById('flash-overlay'); f.style.opacity = 1; setTimeout(()=>f.style.opacity=0, 200); }

        function showMayoAppear() {
            // Показуємо золотий спалах коли МАЙОНЕЗ доступний
            const f = document.getElementById('flash-overlay');
            f.style.background = 'gold';
            f.style.opacity = 0.3;
            setTimeout(()=>{ f.style.opacity=0; f.style.background='white'; }, 300);
            // Текст появи
            const msg = document.createElement('div');
            msg.innerHTML = '✨ МАЙОНЕЗ ДОСТУПНИЙ! ✨';
            msg.style.cssText = `position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);font-size:1.5rem;font-weight:900;color:gold;text-shadow:0 0 20px gold;z-index:9998;pointer-events:none;animation:fadeInOut 2s forwards;`;
            document.body.appendChild(msg);
            const style = document.createElement('style');
            style.textContent = '@keyframes fadeInOut{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}';
            document.head.appendChild(style);
            setTimeout(()=>msg.remove(), 2000);
        }

        async function triggerMayoEvent(winnerIdx) {
            gameActive = false;
            const winnerName = players[winnerIdx].name;
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let phase = 'launch'; // launch -> earth -> explosion -> moon -> win
            let t = 0;
            let rocketY = canvas.height * 0.7;
            let rocketX = canvas.width * 0.2;
            let earthScale = 0;
            let mayoJarY = -100;
            let mayoJarX = canvas.width * 0.5;
            let explosionPhase = 0;
            let moonPhase = false;
            let stars = Array.from({length:200},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,twinkle:Math.random()}));
            let particles3d = [];

            // Draw 3D Earth with canvas
            function drawEarth(cx, cy, r, rotation) {
                // Shadow/atmosphere glow
                const glow = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r*1.4);
                glow.addColorStop(0, 'rgba(100,180,255,0.15)');
                glow.addColorStop(0.7, 'rgba(30,100,200,0.08)');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(cx, cy, r*1.4, 0, Math.PI*2); ctx.fill();

                // Ocean base
                const oceanGrad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
                oceanGrad.addColorStop(0, '#5bc8f5');
                oceanGrad.addColorStop(0.4, '#1a6fa8');
                oceanGrad.addColorStop(1, '#0a3d6b');
                ctx.fillStyle = oceanGrad;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

                // Continents (simplified with rotation)
                ctx.save();
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                ctx.fillStyle = '#2ecc71';
                // Europe/Africa
                const off = rotation * r * 0.5;
                ctx.beginPath();
                ctx.ellipse(cx - r*0.15 + off, cy - r*0.1, r*0.18, r*0.35, 0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - r*0.1 + off, cy + r*0.25, r*0.14, r*0.28, -0.1, 0, Math.PI*2); ctx.fill();
                // Americas
                ctx.beginPath();
                ctx.ellipse(cx - r*0.5 + off, cy - r*0.05, r*0.15, r*0.3, 0.15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - r*0.52 + off, cy + r*0.3, r*0.12, r*0.25, -0.1, 0, Math.PI*2); ctx.fill();
                // Asia
                ctx.beginPath();
                ctx.ellipse(cx + r*0.2 + off, cy - r*0.1, r*0.28, r*0.25, 0.1, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.ellipse(cx + r*0.4 + off, cy + r*0.3, r*0.15, r*0.12, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                // Clouds
                ctx.save();
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                const co = rotation * r * 0.3;
                ctx.beginPath(); ctx.ellipse(cx - r*0.3 + co, cy - r*0.4, r*0.25, r*0.07, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx + r*0.1 + co, cy + r*0.2, r*0.2, r*0.06, -0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx - r*0.05 + co, cy - r*0.2, r*0.18, r*0.05, 0.1, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                // Specular highlight
                const spec = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, 0, cx - r*0.2, cy - r*0.2, r*0.6);
                spec.addColorStop(0, 'rgba(255,255,255,0.3)');
                spec.addColorStop(1, 'transparent');
                ctx.fillStyle = spec;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

                // Dark edge
                const edge = ctx.createRadialGradient(cx+r*0.4, cy+r*0.4, r*0.3, cx, cy, r);
                edge.addColorStop(0, 'transparent');
                edge.addColorStop(0.7, 'transparent');
                edge.addColorStop(1, 'rgba(0,0,30,0.7)');
                ctx.fillStyle = edge;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            }

            function drawMoon(cx, cy, r) {
                const moonGrad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
                moonGrad.addColorStop(0, '#e8e0c8');
                moonGrad.addColorStop(0.6, '#c8bfa0');
                moonGrad.addColorStop(1, '#8a7f68');
                ctx.fillStyle = moonGrad;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                // craters
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                [[cx+r*0.2,cy-r*0.1,r*0.12],[cx-r*0.3,cy+r*0.2,r*0.08],[cx+r*0.05,cy+r*0.3,r*0.06]].forEach(([x,y,cr])=>{
                    ctx.beginPath(); ctx.arc(x,y,cr,0,Math.PI*2); ctx.fill();
                });
                // specular
                const ms = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r*0.8);
                ms.addColorStop(0, 'rgba(255,255,255,0.25)'); ms.addColorStop(1, 'transparent');
                ctx.fillStyle = ms;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            }

            function drawRocket(x, y, scale=1) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                // Body
                ctx.fillStyle = '#ddd';
                ctx.beginPath(); ctx.roundRect(-12, -30, 24, 50, 5); ctx.fill();
                // Nose
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(-12,-30); ctx.lineTo(0,-55); ctx.lineTo(12,-30); ctx.closePath(); ctx.fill();
                // Window
                ctx.fillStyle = '#3498db';
                ctx.beginPath(); ctx.arc(0, -10, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath(); ctx.arc(-2, -12, 3, 0, Math.PI*2); ctx.fill();
                // Fins
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(-12,15); ctx.lineTo(-25,35); ctx.lineTo(-12,25); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(12,15); ctx.lineTo(25,35); ctx.lineTo(12,25); ctx.closePath(); ctx.fill();
                // Flame
                const flameH = 20 + Math.sin(t*0.3)*8;
                const fg = ctx.createLinearGradient(0,20,0,20+flameH);
                fg.addColorStop(0,'#fff'); fg.addColorStop(0.3,'#ff6600'); fg.addColorStop(1,'transparent');
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.ellipse(0,20+flameH/2,8,flameH/2,0,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }

            function drawMayoJar(x, y, scale=1) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                // Jar body
                ctx.fillStyle = '#fffbe6';
                ctx.beginPath(); ctx.roundRect(-20, -30, 40, 55, 8); ctx.fill();
                ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.stroke();
                // Lid
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.roundRect(-22, -38, 44, 12, 4); ctx.fill();
                // Label
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.roundRect(-15, -15, 30, 25, 3); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('MAYO', 0, -5);
                ctx.fillText('🥚', 0, 5);
                // Shine
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.ellipse(-8, -10, 5, 15, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            let earthRotation = 0;
            let explodeParts = [];
            
            function animLoop() {
                if (t % 2 !== 0) { t++; requestAnimationFrame(animLoop); return; }
                t++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Space background
                ctx.fillStyle = '#000010';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Stars
                stars.forEach(s => {
                    const tw = Math.sin(t * 0.05 + s.twinkle * 10) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${0.3 + tw * 0.7})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                });

                if(phase === 'launch') {
                    // Rocket launching from player position
                    rocketY -= 2 + t * 0.02;
                    rocketX += (canvas.width/2 - rocketX) * 0.02;
                    drawRocket(rocketX, rocketY, 1 + t * 0.01);
                    // Trail
                    for(let i=0; i<3; i++) {
                        ctx.fillStyle = `rgba(255,${100+i*50},0,${0.6-i*0.15})`;
                        ctx.beginPath(); ctx.arc(rocketX + (Math.random()-0.5)*10, rocketY + 40 + i*15, 5-i, 0, Math.PI*2); ctx.fill();
                    }
                    if(t > 120) { phase = 'earth'; t = 0; }
                }

                else if(phase === 'earth') {
                    earthScale = Math.min(1, earthScale + 0.01);
                    earthRotation += 0.005;
                    const earthR = Math.min(canvas.width, canvas.height) * 0.35 * earthScale;
                    const ecx = canvas.width/2, ecy = canvas.height/2;
                    drawEarth(ecx, ecy, earthR, earthRotation);
                    
                    // Rocket flies up on the left
                    drawRocket(canvas.width * 0.1, canvas.height * 0.15 + Math.sin(t*0.1)*5, 0.7);

                    // Mayo jar falls from top
                    mayoJarY = -80 + t * 2;
                    mayoJarX = canvas.width / 2;
                    const jarScale = 0.5 + t * 0.01;
                    drawMayoJar(mayoJarX, mayoJarY, jarScale);

                    if(mayoJarY > canvas.height/2 - 30) {
                        phase = 'explosion'; t = 0;
                        // Create explode particles
                        for(let i=0;i<60;i++) {
                            explodeParts.push({
                                x: canvas.width/2, y: canvas.height/2,
                                vx: (Math.random()-0.5)*20,
                                vy: (Math.random()-0.5)*20,
                                r: Math.random()*20+5,
                                color: ['#ff6600','#ff0000','#ffcc00','#2ecc71','#3498db','#1a6fa8'][Math.floor(Math.random()*6)],
                                life: 1
                            });
                        }
                    }
                }

                else if(phase === 'explosion') {
                    // Earth exploding
                    explodeParts.forEach(p => {
                        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.015;
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
                    });
                    ctx.globalAlpha = 1;
                    // Big flash
                    const expAlpha = Math.max(0, 0.8 - t*0.02);
                    ctx.fillStyle = `rgba(255,200,0,${expAlpha})`;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, t*15, 0, Math.PI*2); ctx.fill();
                    // Shockwave ring
                    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, 0.7 - t*0.015)})`;
                    ctx.lineWidth = 8;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, t*20, 0, Math.PI*2); ctx.stroke();

                    // Rocket flies away to moon direction
                    drawRocket(canvas.width*0.1 + t*2, canvas.height*0.15 - t*1.5, 0.7);

                    if(t > 50) { phase = 'moon'; t = 0; }
                }

                else if(phase === 'moon') {
                    // Show moon with winner on it
                    const moonX = canvas.width * 0.5;
                    const moonY = canvas.height * 0.45;
                    const moonR = Math.min(canvas.width, canvas.height) * 0.22;
                    drawMoon(moonX, moonY, moonR);

                    if(t > 30) {
                        // Winner character on moon surface
                        ctx.font = `bold ${Math.min(60, moonR*0.4)}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.fillStyle = 'white';
                        ctx.textBaseline = 'bottom';
                        ctx.shadowColor = 'gold';
                        ctx.shadowBlur = 20;
                        ctx.fillText('🧑‍🚀', moonX, moonY + moonR * 0.2);
                        ctx.shadowBlur = 0;
                        // Name
                        ctx.font = `bold ${Math.floor(moonR*0.2)}px Arial`;
                        ctx.fillStyle = 'gold';
                        ctx.fillText(winnerName, moonX, moonY + moonR * 0.5);
                    }

                    // Stars flying
                    if(t % 3 === 0) {
                        ctx.fillStyle = 'gold';
                        ctx.font = '2rem Arial';
                        ctx.fillText('⭐', Math.random()*canvas.width, Math.random()*canvas.height*0.3);
                    }

                    if(t > 60) {
                        // ПЕРЕМОГА текст
                        const winEl = document.getElementById('mayo-winner-text');
                        winEl.innerHTML = `🏆 ${winnerName} ПЕРЕМОЖЕЦЬ!🏆<br>🌕 Залишився на Місяці! 🥫`;
                        winEl.style.display = 'block';
                        
                        if(t > 160) {
                            overlay.style.display = 'none';
                            winEl.style.display = 'none';
                            gameActive = false;
                            setCenterText(`🏆 ${winnerName} ПЕРЕМОЖЕЦЬ! 🥫🌕`, "gold");
                            setTimeout(()=>location.reload(), 4000);
                            return;
                        }
                    }
                }
                requestAnimationFrame(animLoop);
            }
            animLoop();
        }

        // Зоряний фон
        (function initStarBg() {
            const bg = document.getElementById('star-bg');
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'star-particle';
                const size = Math.random()*3+1;
                s.style.width = size+'px'; s.style.height = size+'px';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.animationDuration = (Math.random()*3+2)+'s';
                s.style.animationDelay = (Math.random()*5)+'s';
                bg.appendChild(s);
            }
        })();
    </script>
