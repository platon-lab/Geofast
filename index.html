        // ===== КРАСИВА КУБЕРПАНК-КОСМІЧНА АНІМАЦІЯ ПОНЧИКА (ПОКРАЩЕНО!) =====
        async function triggerDonutEvent(winnerIdx) {
            gameActive = false;
            const winner = players[winnerIdx];
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let t = 0;
            let phase = 'fly'; 
            const W = canvas.width, H = canvas.height;
            const charImg = new Image();
            charImg.src = winner.img;

            await new Promise(r => { charImg.onload = r; charImg.onerror = r; setTimeout(r, 1000); });

            function drawDonut(x, y, r) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(t * 0.03);
                // Зовнішнє кільце
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI*2);
                const dg = ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r);
                dg.addColorStop(0,'#ffcc88'); dg.addColorStop(1,'#cc7700');
                ctx.fillStyle = dg; ctx.fill();
                // Глазур
                ctx.beginPath();
                ctx.arc(0, 0, r*0.85, 0, Math.PI*2);
                const ig = ctx.createRadialGradient(-r*0.2,-r*0.3,0,0,0,r*0.85);
                ig.addColorStop(0,'#ff99cc'); ig.addColorStop(1,'#ff3399');
                ctx.fillStyle = ig; ctx.fill();
                // Посипка
                const sprinkles = [{x:-r*0.3,y:-r*0.4,a:0.5,c:'#ff0'},{x:r*0.2,y:-r*0.5,a:-0.3,c:'#0f0'},{x:r*0.4,y:r*0.1,a:1,c:'#00f'},{x:-r*0.5,y:r*0.2,a:-0.8,c:'#f00'},{x:r*0.1,y:r*0.4,a:0.2,c:'#0ff'}];
                sprinkles.forEach(s=>{ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.a);ctx.fillStyle=s.c;ctx.fillRect(-r*0.06,-r*0.02,r*0.12,r*0.04);ctx.restore();});
                // Дірка всередині
                ctx.beginPath(); ctx.arc(0,0,r*0.35,0,Math.PI*2);
                ctx.fillStyle='#0c0114'; ctx.fill();
                ctx.restore();
            }

            function drawCharOnCyberBg() {
                // Виключено білий фон! Встановлено гарний неоновий градієнт
                let bgGrad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, W);
                bgGrad.addColorStop(0, '#1c0a35');
                bgGrad.addColorStop(1, '#05020c');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Ефекти кібер-ліній
                ctx.strokeStyle = 'rgba(255, 51, 153, 0.15)';
                ctx.lineWidth = 1;
                for(let i=0; i<W; i+=40) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
                }

                const cs = 120;
                ctx.save();
                // Світіння навколо героя
                ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 25;
                ctx.beginPath(); ctx.arc(W/2, H*0.6, cs/2+5, 0, Math.PI*2);
                ctx.fillStyle = '#00ffcc'; ctx.fill();
                ctx.shadowBlur = 0;

                ctx.beginPath(); ctx.arc(W/2, H*0.6, cs/2, 0, Math.PI*2); ctx.clip();
                if(charImg.complete && charImg.naturalWidth > 0) {
                    ctx.drawImage(charImg, W/2-cs/2, H*0.6-cs/2, cs, cs);
                }
                ctx.restore();
                
                ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
                ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 10;
                ctx.fillText(winner.name, W/2, H*0.6+cs/2+35);
                ctx.shadowBlur = 0;
            }

            function animDonut() {
                ctx.clearRect(0,0,W,H);
                if(phase === 'fly') {
                    drawCharOnCyberBg();
                    const donutY = -200 + t * 10;
                    const donutR = 80 + t * 1.5;
                    drawDonut(W/2, donutY, Math.min(donutR, 150));
                    if(t > 50 && donutY > H*0.35) { phase = 'eat'; t = 0; }
                }
                else if(phase === 'eat') {
                    drawCharOnCyberBg();
                    const donutR = 150 - t * 3.5;
                    if(donutR > 0) drawDonut(W/2, H*0.38, donutR);
                    
                    if(t % 3 === 0) {
                        createParticles(W/2 + (Math.random()-0.5)*100, H*0.4, '#ff3399');
                    }
                    if(t > 45) { phase = 'immortal'; t = 0; }
                }
                else if(phase === 'immortal') {
                    const glow = Math.sin(t*0.15)*0.3+0.7;
                    ctx.fillStyle = `rgba(255,215,0,${glow*0.15})`;
                    ctx.fillRect(0,0,W,H);
                    drawCharOnCyberBg();
                    
                    ctx.strokeStyle = `rgba(255,215,0,${glow})`;
                    ctx.lineWidth = 6;
                    ctx.shadowColor = 'gold'; ctx.shadowBlur = 20;
                    ctx.beginPath(); ctx.arc(W/2, H*0.6, 85, 0, Math.PI*2); ctx.stroke();
                    
                    ctx.font = 'bold 80px Arial'; ctx.fillStyle = 'gold'; ctx.textAlign = 'center';
                    ctx.fillText('♾️', W/2, H*0.25);
                    ctx.shadowBlur=0;
                    
                    ctx.font='bold 32px sans-serif'; ctx.fillStyle='#ff007f';
                    ctx.fillText('НЕСКІНЧЕННІСТЬ HP!', W/2, H*0.88);
                    if(t > 80) {
                        overlay.style.display='none';
                        winner.immortal = true;
                        winner.hp = Infinity;
                        gameActive = true;
                        renderPlayers();
                        animateText(winnerIdx, "♾️ БЕЗСМЕРТНИЙ!", "gold");
                        passTurn((winnerIdx+1)%players.length);
                        return;
                    }
                }
                t++;
                requestAnimationFrame(animDonut);
            }
            animDonut();
        }

        // ===== АНІМАЦІЯ ДЛЯ НОВОГО ОСОБЛИВОГО ПРЕДМЕТА: ✨КЕТЧУП✨ (1%) =====
        async function triggerKetchupEvent(bossIdx) {
            gameActive = false;
            const boss = players[bossIdx];
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const bossImg = new Image();
            bossImg.src = boss.img;
            await new Promise(r => { bossImg.onload=r; bossImg.onerror=r; setTimeout(r,1000); });
            
            let t = 0;
            let phase = 'flood'; // flood -> transform -> strike
            const W = canvas.width, H = canvas.height;
            
            function animKetchup() {
                ctx.clearRect(0,0,W,H);
                
                if(phase === 'flood') {
                    // Темно-бордовий стильний фон
                    ctx.fillStyle = '#080104'; ctx.fillRect(0,0,W,H);
                    ctx.fillStyle = '#b3001b';
                    ctx.fillRect(0, 0, W, t * (H / 30));
                    
                    // Гігантська банка кетчупу летить
                    ctx.save(); ctx.translate(W/2, H*0.35 + Math.sin(t*0.2)*10);
                    ctx.fillStyle = '#ff1e38'; ctx.beginPath(); ctx.roundRect(-30, -60, 60, 110, 12); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('✨KETCHUP✨', 0, -10);
                    ctx.font = '24px Arial'; ctx.fillText('🍅', 0, 20);
                    ctx.restore();
                    
                    if(t > 35) { phase = 'transform'; t = 0; }
                }
                else if(phase === 'transform') {
                    ctx.fillStyle = '#3d0006'; ctx.fillRect(0,0,W,H);
                    
                    let scale = 1 + Math.sin(t*0.2)*0.08;
                    let radius = 90 * scale;
                    let grad = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, radius*1.6);
                    grad.addColorStop(0, 'rgba(255, 30, 60, 0.9)');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(W/2, H/2, radius*1.6, 0, Math.PI*2); ctx.fill();
                    
                    ctx.save();
                    ctx.beginPath(); ctx.arc(W/2, H/2, radius, 0, Math.PI*2); ctx.clip();
                    if(bossImg.complete && bossImg.naturalWidth > 0) {
                        ctx.drawImage(bossImg, W/2 - radius, H/2 - radius, radius*2, radius*2);
                    }
                    ctx.restore();
                    
                    ctx.fillStyle = 'gold'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
                    ctx.shadowColor = 'red'; ctx.shadowBlur = 15;
                    ctx.fillText('🍅 СТАНОВЛЕННЯ МЕГА-БОСА 🍅', W/2, H*0.18);
                    ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#ffcc00';
                    ctx.fillText('+30 HP | +3 ЩИТИ | +5 ЯДЕРОК', W/2, H*0.85);
                    ctx.shadowBlur = 0;
                    
                    if(t > 50) { phase = 'strike'; t = 0; }
                }
                else if(phase === 'strike') {
                    ctx.fillStyle = '#1f0004'; ctx.fillRect(0,0,W,H);
                    
                    // Блискавки/промені кетчупу по екрану!
                    ctx.strokeStyle = '#ff003c'; ctx.lineWidth = 8;
                    ctx.shadowColor = '#ff003c'; ctx.shadowBlur = 15;
                    for(let i=0; i<5; i++) {
                        ctx.beginPath(); ctx.moveTo(W/2, H/2);
                        ctx.lineTo(Math.random()*W, Math.random()*H); ctx.stroke();
                    }
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = 'white'; ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText('💥 ТОТАЛЬНИЙ РОЗГРОМ! 💥', W/2, H/2);
                    
                    if(t > 35) {
                        overlay.style.display = 'none';
                        boss.hp += 30;
                        boss.shield = 3;
                        boss.nukes += 5;
                        
                        let enemies = players.filter((_, i) => i !== bossIdx && players[i].alive);
                        enemies.forEach(targetEnemy => {
                            targetEnemy.hp = Math.max(1, targetEnemy.hp - 4); 
                        });
                        
                        gameActive = true;
                        renderPlayers();
                        animateText(bossIdx, "🍅 МЕГА БОСС СТАРТУВАВ!", "#ff2244");
                        passTurn((bossIdx+1)%players.length);
                        return;
                    }
                }
                t++;
                requestAnimationFrame(animKetchup);
            }
            animKetchup();
        }

        async function triggerMayoEvent(winnerIdx) {
            gameActive = false;
            const winnerName = players[winnerIdx].name;
            const winnerImgSrc = players[winnerIdx].img;
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const winnerImg = new Image();
            winnerImg.src = winnerImgSrc;
            await new Promise(r => { winnerImg.onload=r; winnerImg.onerror=r; setTimeout(r,1500); });

            const loserImgs = [];
            players.forEach((p, i) => {
                if(i !== winnerIdx && p.alive) {
                    const img = new Image(); img.src = p.img;
                    loserImgs.push({ img, name: p.name, x: 0, y: 0, dead: false, deadT: -1 });
                }
            });

            let phase = 'launch';
            let t = 0;
            let rocketY = canvas.height * 0.7;
            let rocketX = canvas.width * 0.2;
            let earthScale = 0;
            let mayoJarY = -100;
            let mayoJarX = canvas.width * 0.5;
            let explodeParts = [];
            let earthRotation = 0;

            loserImgs.forEach((l, i) => {
                const angle = (i / Math.max(loserImgs.length, 1)) * Math.PI * 2;
                const r = Math.min(canvas.width, canvas.height) * 0.3;
                l.x = canvas.width/2 + r * Math.cos(angle);
                l.y = canvas.height/2 + r * Math.sin(angle);
            });

            let stars = Array.from({length:200},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,twinkle:Math.random()}));

            function drawEarth(cx, cy, r, rotation) {
                const glow = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r*1.4);
                glow.addColorStop(0, 'rgba(100,180,255,0.15)');
                glow.addColorStop(0.7, 'rgba(30,100,200,0.08)');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath(); ctx.arc(cx, cy, r*1.4, 0, Math.PI*2); ctx.fill();

                const oceanGrad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
                oceanGrad.addColorStop(0, '#5bc8f5');
                oceanGrad.addColorStop(0.4, '#1a6fa8');
                oceanGrad.addColorStop(1, '#0a3d6b');
                ctx.fillStyle = oceanGrad;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

                ctx.save();
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                ctx.fillStyle = '#2ecc71';
                const off = rotation * r * 0.5;
                ctx.beginPath();
                ctx.ellipse(cx - r*0.15 + off, cy - r*0.1, r*0.18, r*0.35, 0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - r*0.1 + off, cy + r*0.25, r*0.14, r*0.28, -0.1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - r*0.5 + off, cy - r*0.05, r*0.15, r*0.3, 0.15, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx - r*0.52 + off, cy + r*0.3, r*0.12, r*0.25, -0.1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cx + r*0.2 + off, cy - r*0.1, r*0.28, r*0.25, 0.1, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.ellipse(cx + r*0.4 + off, cy + r*0.3, r*0.15, r*0.12, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                const co = rotation * r * 0.3;
                ctx.beginPath(); ctx.ellipse(cx - r*0.3 + co, cy - r*0.4, r*0.25, r*0.07, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx + r*0.1 + co, cy + r*0.2, r*0.2, r*0.06, -0.2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx - r*0.05 + co, cy - r*0.2, r*0.18, r*0.05, 0.1, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                const spec = ctx.createRadialGradient(cx - r*0.35, cy - r*0.35, 0, cx - r*0.2, cy - r*0.2, r*0.6);
                spec.addColorStop(0, 'rgba(255,255,255,0.3)');
                spec.addColorStop(1, 'transparent');
                ctx.fillStyle = spec;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

                const edge = ctx.createRadialGradient(cx+r*0.4, cy+r*0.4, r*0.3, cx, cy, r);
                edge.addColorStop(0, 'transparent');
                edge.addColorStop(0.7, 'transparent');
                edge.addColorStop(1, 'rgba(0,0,30,0.7)');
                ctx.fillStyle = edge;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            }

            function drawMoon(cx, cy, r) {
                const moonGrad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
                moonGrad.addColorStop(0, '#e8e0c8');
                moonGrad.addColorStop(0.6, '#c8bfa0');
                moonGrad.addColorStop(1, '#8a7f68');
                ctx.fillStyle = moonGrad;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                [[cx+r*0.2,cy-r*0.1,r*0.12],[cx-r*0.3,cy+r*0.2,r*0.08],[cx+r*0.05,cy+r*0.3,r*0.06]].forEach(([x,y,cr])=>{
                    ctx.beginPath(); ctx.arc(x,y,cr,0,Math.PI*2); ctx.fill();
                });
                const ms = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r*0.8);
                ms.addColorStop(0, 'rgba(255,255,255,0.25)'); ms.addColorStop(1, 'transparent');
                ctx.fillStyle = ms;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            }

            function drawRocket(x, y, scale=1) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                ctx.fillStyle = '#ddd';
                ctx.beginPath(); ctx.roundRect(-12, -30, 24, 50, 5); ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(-12,-30); ctx.lineTo(0,-55); ctx.lineTo(12,-30); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#3498db';
                ctx.beginPath(); ctx.arc(0, -10, 7, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath(); ctx.arc(-2, -12, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(-12,15); ctx.lineTo(-25,35); ctx.lineTo(-12,25); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.moveTo(12,15); ctx.lineTo(25,35); ctx.lineTo(12,25); ctx.closePath(); ctx.fill();
                const flameH = 20 + Math.sin(t*0.3)*8;
                const fg = ctx.createLinearGradient(0,20,0,20+flameH);
                fg.addColorStop(0,'#fff'); fg.addColorStop(0.3,'#ff6600'); fg.addColorStop(1,'transparent');
                ctx.fillStyle = fg;
                ctx.beginPath(); ctx.ellipse(0,20+flameH/2,8,flameH/2,0,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }

            function drawMayoJar(x, y, scale=1) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                ctx.fillStyle = '#fffbe6';
                ctx.beginPath(); ctx.roundRect(-20, -30, 40, 55, 8); ctx.fill();
                ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.roundRect(-22, -38, 44, 12, 4); ctx.fill();
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.roundRect(-15, -15, 30, 25, 3); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('MAYO', 0, -5);
                ctx.fillText('🥚', 0, 5);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.ellipse(-8, -10, 5, 15, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            function animLoop() {
                if (t % 2 !== 0) { t++; requestAnimationFrame(animLoop); return; }
                t++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#000010';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                stars.forEach(s => {
                    const tw = Math.sin(t * 0.05 + s.twinkle * 10) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${0.3 + tw * 0.7})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                });

                if(phase === 'launch') {
                    rocketY -= 2 + t * 0.02;
                    rocketX += (canvas.width/2 - rocketX) * 0.02;
                    drawRocket(rocketX, rocketY, 1 + t * 0.01);
                    for(let i=0; i<3; i++) {
                        ctx.fillStyle = `rgba(255,${100+i*50},0,${0.6-i*0.15})`;
                        ctx.beginPath(); ctx.arc(rocketX + (Math.random()-0.5)*10, rocketY + 40 + i*15, 5-i, 0, Math.PI*2); ctx.fill();
                    }
                    if(t > 120) { phase = 'earth'; t = 0; }
                }

                else if(phase === 'earth') {
                    earthScale = Math.min(1, earthScale + 0.01);
                    earthRotation += 0.005;
                    const earthR = Math.min(canvas.width, canvas.height) * 0.35 * earthScale;
                    const ecx = canvas.width/2, ecy = canvas.height/2;
                    drawEarth(ecx, ecy, earthR, earthRotation);

                    loserImgs.forEach((l, i) => {
                        const deadProgress = Math.max(0, (t - 20 - i*5) / 40);
                        ctx.save();
                        ctx.globalAlpha = Math.max(0.1, 1 - deadProgress);
                        ctx.beginPath(); ctx.arc(l.x, l.y, 22, 0, Math.PI*2);
                        ctx.fillStyle = deadProgress > 0 ? `rgba(255,0,0,${deadProgress*0.5})` : 'rgba(80,80,80,0.5)';
                        ctx.fill();
                        if(l.img.complete && l.img.naturalWidth > 0) {
                            ctx.beginPath(); ctx.arc(l.x, l.y, 20, 0, Math.PI*2); ctx.clip();
                            ctx.drawImage(l.img, l.x-20, l.y-20, 40, 40);
                        } else {
                            ctx.fillStyle='#666'; ctx.beginPath(); ctx.arc(l.x,l.y,20,0,Math.PI*2); ctx.fill();
                        }
                        if(deadProgress > 0.5) {
                            ctx.font='18px Arial'; ctx.textAlign='center';
                            ctx.fillText('💀', l.x, l.y - 28);
                        }
                        ctx.restore();
                    });

                    drawRocket(canvas.width * 0.1, canvas.height * 0.15 + Math.sin(t*0.1)*5, 0.7);

                    mayoJarY = -80 + t * 2;
                    mayoJarX = canvas.width / 2;
                    const jarScale = 0.5 + t * 0.01;
                    drawMayoJar(mayoJarX, mayoJarY, jarScale);

                    if(mayoJarY > canvas.height/2 - 30) {
                        phase = 'explosion'; t = 0;
                        for(let i=0;i<60;i++) {
                            explodeParts.push({
                                x: canvas.width/2, y: canvas.height/2,
                                vx: (Math.random()-0.5)*20,
                                vy: (Math.random()-0.5)*20,
                                r: Math.random()*20+5,
                                color: ['#ff6600','#ff0000','#ffcc00','#2ecc71','#3498db','#1a6fa8'][Math.floor(Math.random()*6)],
                                life: 1
                            });
                        }
                    }
                }

                else if(phase === 'explosion') {
                    explodeParts.forEach(p => {
                        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.015;
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
                    });
                    ctx.globalAlpha = 1;
                    const expAlpha = Math.max(0, 0.8 - t*0.02);
                    ctx.fillStyle = `rgba(255,200,0,${expAlpha})`;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, t*15, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, 0.7 - t*0.015)})`;
                    ctx.lineWidth = 8;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, t*20, 0, Math.PI*2); ctx.stroke();

                    loserImgs.forEach((l, i) => {
                        const angle = (i / Math.max(loserImgs.length,1)) * Math.PI * 2;
                        const dist = t * 6;
                        const lx = canvas.width/2 + Math.cos(angle)*dist;
                        const ly = canvas.height/2 + Math.sin(angle)*dist;
                        ctx.save();
                        ctx.globalAlpha = Math.max(0, 1 - t*0.02);
                        ctx.beginPath(); ctx.arc(lx, ly, 18, 0, Math.PI*2); ctx.clip();
                        if(l.img.complete && l.img.naturalWidth > 0) {
                            ctx.drawImage(l.img, lx-18, ly-18, 36, 36);
                        }
                        ctx.restore();
                        ctx.globalAlpha = Math.max(0, 1 - t*0.02);
                        ctx.font='14px Arial';ctx.textAlign='center';
                        ctx.fillText('💀', lx, ly-22);
                        ctx.globalAlpha=1;
                    });

                    drawRocket(canvas.width*0.1 + t*2, canvas.height*0.15 - t*1.5, 0.7);

                    if(t > 50) { phase = 'moon'; t = 0; }
                }

                else if(phase === 'moon') {
                    const moonX = canvas.width * 0.5;
                    const moonY = canvas.height * 0.45;
                    const moonR = Math.min(canvas.width, canvas.height) * 0.22;
                    drawMoon(moonX, moonY, moonR);

                    if(t > 30) {
                        const rocketLandX = moonX + moonR*0.3;
                        const rocketLandY = moonY + moonR*0.6;
                        const rocketArriveT = Math.min(1, (t-30)/40);
                        const rocketCurX = canvas.width*0.8 + (rocketLandX - canvas.width*0.8)*rocketArriveT;
                        const rocketCurY = canvas.height*0.05 + (rocketLandY - canvas.height*0.05)*rocketArriveT;
                        drawRocket(rocketCurX, rocketCurY, 0.5);
                    }

                    if(t > 70) {
                        const photoX = moonX - moonR*0.15;
                        const photoY = moonY + moonR*0.15;
                        const photoR = moonR * 0.28;
                        ctx.save();
                        ctx.shadowColor = 'gold'; ctx.shadowBlur = 30;
                        ctx.beginPath(); ctx.arc(photoX, photoY, photoR+4, 0, Math.PI*2);
                        ctx.strokeStyle = 'gold'; ctx.lineWidth = 4; ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.beginPath(); ctx.arc(photoX, photoY, photoR, 0, Math.PI*2); ctx.clip();
                        if(winnerImg.complete && winnerImg.naturalWidth > 0) {
                            ctx.drawImage(winnerImg, photoX-photoR, photoY-photoR, photoR*2, photoR*2);
                        } else {
                            ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(photoX,photoY,photoR,0,Math.PI*2); ctx.fill();
                        }
                        ctx.restore();
                        ctx.font = `bold ${Math.floor(moonR*0.18)}px Arial`;
                        ctx.fillStyle = 'gold';
                        ctx.textAlign = 'center';
                        ctx.shadowColor='gold'; ctx.shadowBlur=10;
                        ctx.fillText(winnerName, photoX, photoY + photoR + moonR*0.18);
                        ctx.shadowBlur=0;
                    }

                    if(t % 3 === 0) {
                        ctx.fillStyle = 'gold';
                        ctx.font = '2rem Arial';
                        ctx.fillText('⭐', Math.random()*canvas.width, Math.random()*canvas.height*0.3);
                    }

                    if(t > 60) {
                        const winEl = document.getElementById('mayo-winner-text');
                        winEl.innerHTML = `🏆 ${winnerName} ПЕРЕМОЖЕЦЬ!🏆<br>🌕 Залишився на Місяці! 🥫`;
                        winEl.style.display = 'block';
                        
                        if(t > 160) {
                            overlay.style.display = 'none';
                            winEl.style.display = 'none';
                            gameActive = false;
                            setCenterText(`🏆 ${winnerName} ПЕРЕМОЖЕЦЬ! 🥫🌕`, "gold");
                            setTimeout(()=>location.reload(), 4000);
                            return;
                        }
                    }
                }
                requestAnimationFrame(animLoop);
            }
            animLoop();
        }

        async function triggerDonutCounterAttack(attackerIdx, immortalIdx) {
            const attacker = players[attackerIdx];
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const W = canvas.width, H = canvas.height;
            const attackerImg = new Image(); attackerImg.src = attacker.img;
            await new Promise(r => { attackerImg.onload=r; attackerImg.onerror=r; setTimeout(r,1000); });

            let t = 0;
            function animCounter() {
                ctx.clearRect(0,0,W,H);
                ctx.fillStyle = '#0c0216'; ctx.fillRect(0,0,W,H);
                const cs = 100;
                ctx.save();
                ctx.beginPath(); ctx.arc(W/2, H*0.6, cs/2, 0, Math.PI*2); ctx.clip();
                if(attackerImg.complete && attackerImg.naturalWidth > 0) {
                    ctx.drawImage(attackerImg, W/2-cs/2, H*0.6-cs/2, cs, cs);
                }
                ctx.restore();
                ctx.fillStyle='#fff';ctx.font='bold 24px Arial';ctx.textAlign='center';
                ctx.fillText(attacker.name, W/2, H*0.6+cs/2+30);
                const donutY = -100 + t*9;
                const scale = Math.min(1, t*0.05);
                ctx.save(); ctx.translate(W/2, Math.min(donutY, H*0.45)); ctx.scale(1+scale, 1+scale);
                const r = 90;
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
                const dg=ctx.createRadialGradient(-30,-30,0,0,0,r);dg.addColorStop(0,'#ffcc88');dg.addColorStop(1,'#cc7700');
                ctx.fillStyle=dg;ctx.fill();
                ctx.beginPath();ctx.arc(0,0,r*0.85,0,Math.PI*2);
                ctx.fillStyle='#ff3399';ctx.fill();
                ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);ctx.fillStyle='#000010';ctx.fill();
                ctx.restore();
                if(donutY > H*0.4 && t > 20) {
                    ctx.fillStyle=`rgba(255,0,85,${Math.min(0.4,(t-20)*0.05)})`;ctx.fillRect(0,0,W,H);
                    ctx.font='bold 40px sans-serif';ctx.fillStyle='white';ctx.textAlign='center';
                    ctx.fillText('💀 ЗНИЩЕНО ПОНЧИКОМ!', W/2, H*0.5);
                }
                if(t > 80) {
                    overlay.style.display='none';
                    attacker.hp = 0; attacker.alive = false;
                    gameActive = true;
                    renderPlayers();
                    if(checkWin()) return;
                    passTurn((attackerIdx+1)%players.length);
                    return;
                }
                t++;
                requestAnimationFrame(animCounter);
            }
            animCounter();
        }

        async function triggerDonutAllianceEvent(giverIdx, immortalIdx) {
            const giver = players[giverIdx];
            const immortal = players[immortalIdx];
            const overlay = document.getElementById('mayo-overlay');
            const canvas = document.getElementById('mayo-canvas');
            const ctx = canvas.getContext('2d');
            overlay.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const W = canvas.width, H = canvas.height;

            const giverImg = new Image(); giverImg.src = giver.img;
            const immortalImg = new Image(); immortalImg.src = immortal.img;
            await Promise.all([
                new Promise(r=>{giverImg.onload=r;giverImg.onerror=r;setTimeout(r,1000);}),
                new Promise(r=>{immortalImg.onload=r;immortalImg.onerror=r;setTimeout(r,1000);})
            ]);

            let t = 0;
            function animAlliance() {
                ctx.clearRect(0,0,W,H);
                ctx.fillStyle='#0e021a';ctx.fillRect(0,0,W,H);
                if(t < 60) {
                    const cs=100;
                    ctx.save();ctx.beginPath();ctx.arc(W*0.35,H*0.6,cs/2,0,Math.PI*2);ctx.clip();
                    if(giverImg.complete && giverImg.naturalWidth > 0) ctx.drawImage(giverImg,W*0.35-cs/2,H*0.6-cs/2,cs,cs);
                    ctx.restore();
                    ctx.fillStyle='#fff';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(giver.name,W*0.35,H*0.6+cs/2+28);
                    const donutY = -100 + t*6;
                    ctx.save();ctx.translate(W*0.35, Math.min(donutY,H*0.35));
                    const r=70;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
                    const dg=ctx.createRadialGradient(-20,-20,0,0,0,r);dg.addColorStop(0,'#ffcc88');dg.addColorStop(1,'#cc7700');
                    ctx.fillStyle=dg;ctx.fill();ctx.beginPath();ctx.arc(0,0,r*0.85,0,Math.PI*2);ctx.fillStyle='#ff3399';ctx.fill();
                    ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);ctx.fillStyle='#000010';ctx.fill();ctx.restore();
                    if(donutY > H*0.3) {
                        ctx.font='bold 28px sans-serif';ctx.fillStyle='gold';ctx.textAlign='center';
                        ctx.fillText('♾️ '+giver.name+' теж безсмертний!',W/2,H*0.25);
                    }
                }
                else {
                    const tt = t-60;
                    const cs=100;
                    ctx.save();ctx.beginPath();ctx.arc(W*0.25,H*0.55,cs/2,0,Math.PI*2);ctx.clip();
                    if(giverImg.complete && giverImg.naturalWidth > 0) ctx.drawImage(giverImg,W*0.25-cs/2,H*0.55-cs/2,cs,cs);
                    ctx.restore();
                    ctx.save();ctx.beginPath();ctx.arc(W*0.75,H*0.55,cs/2,0,Math.PI*2);ctx.clip();
                    if(immortalImg.complete && immortalImg.naturalWidth > 0) ctx.drawImage(immortalImg,W*0.75-cs/2,H*0.55-cs/2,cs,cs);
                    ctx.restore();
                    ctx.fillStyle='gold';ctx.font='bold 60px Arial';ctx.textAlign='center';ctx.fillText('🤝',W/2,H*0.55+30);
                    ctx.fillStyle='gold';ctx.font='bold 60px Arial';
                    ctx.fillText('♾️',W*0.25,H*0.35);ctx.fillText('♾️',W*0.75,H*0.35);
                    for(let i=0;i<3;i++){
                        if(Math.random()>0.5){
                            const ex=Math.random()*W, ey=Math.random()*H*0.4+H*0.05;
                            ctx.font='40px Arial';ctx.fillText('💥',ex,ey);
                        }
                    }
                    ctx.fillStyle='#fff';ctx.font='bold 26px sans-serif';ctx.textAlign='center';
                    ctx.fillText('ДВОЄ БЕЗСМЕРТНИХ ПЕРЕМАГАЮТЬ УСІХ!',W/2,H*0.85);
                    if(tt > 100) {
                        overlay.style.display='none';
                        giver.immortal=true; giver.hp=Infinity;
                        giver.ally=immortalIdx; immortal.ally=giverIdx;
                        players.forEach((p,i)=>{ if(i!==giverIdx&&i!==immortalIdx){p.alive=false;p.hp=0;} });
                        gameActive=true;
                        renderPlayers();
                        gameActive=false;
                        setCenterText(`🏆 АЛЬЯНС БЕЗСМЕРТНИХ 🏆\n${giver.name} 🤝 ${immortal.name}`,"gold");
                        createParticles(window.innerWidth/2,window.innerHeight/2,'gold');
                        setTimeout(()=>location.reload(),4000);
                        return;
                    }
                }
                t++;
                requestAnimationFrame(animAlliance);
            }
            animAlliance();
        }

        (function initStarBg() {
            const bg = document.getElementById('star-bg');
            for(let i=0; i<80; i++) {
                const s = document.createElement('div');
                s.className = 'star-particle';
                const size = Math.random()*3+1;
                s.style.width = size+'px'; s.style.height = size+'px';
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.animationDuration = (Math.random()*3+2)+'s';
                s.style.animationDelay = (Math.random()*5)+'s';
                bg.appendChild(s);
            }
        })();
    </script>
</body>
